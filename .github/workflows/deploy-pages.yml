name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Publish to gh-pages
        run: |
          rm -rf /tmp/bidpilot-pages
          mkdir -p /tmp/bidpilot-pages
          cp -R frontend/dist/. /tmp/bidpilot-pages/
          touch /tmp/bidpilot-pages/.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-publish
          git rm -rf .
          cp -R /tmp/bidpilot-pages/. .
          git add -A
          git commit -m "deploy pages for ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
